<!DOCTYPE html>
<html>
<head>
    <title>RTSP Streams Viewer</title>
    <script type="text/javascript" src="jsmpeg.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin: 0 0 16px 0; font-size: 1.4rem; letter-spacing: 1px; }

        /* ── DM Connection Panel ── */
        .dm-panel {
            width: 100%;
            max-width: 1400px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 14px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .dm-panel label {
            font-size: 0.8rem;
            color: #aaa;
            margin-right: 4px;
        }
        .dm-panel input {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 0.85rem;
            width: 130px;
        }
        .dm-panel input.port-input { width: 70px; }

        .dm-status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .dm-status-dot.connected    { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
        .dm-status-dot.disconnected { background: #e74c3c; box-shadow: 0 0 6px #e74c3c; }
        .dm-status-dot.checking     { background: #f39c12; box-shadow: 0 0 6px #f39c12; }

        .dm-status-text {
            font-size: 0.85rem;
            color: #bbb;
            min-width: 180px;
        }

        .dm-btn {
            padding: 7px 18px;
            cursor: pointer;
            background: #1e4a8a;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .dm-btn:hover   { background: #2563b0; }
        .dm-btn:active  { background: #1a3d6e; }
        .dm-btn.auto-on { background: #1a5c2a; }
        .dm-btn.auto-on:hover { background: #1e7235; }

        .dm-separator { flex: 1; }

        /* ── Stream grid ── */
        .streams-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 1400px;
            width: 100%;
        }
        .stream-box {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
        }
        .video-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        .video-canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .controls {
            margin-top: 10px;
            text-align: center;
        }
        button {
            padding: 8px 16px;
            margin: 0 5px;
            cursor: pointer;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover { background: #444; }
        .status {
            margin-top: 5px;
            padding: 5px;
            border-radius: 4px;
            font-family: monospace;
            text-align: center;
            font-size: 0.8rem;
        }
        .connected    { background: #1a472a; color: #2ecc71; }
        .disconnected { background: #4a1919; color: #e74c3c; }
        h2 { margin: 0 0 10px 0; text-align: center; }
    </style>
</head>
<body>
    <h1>RTSP Streams Viewer</h1>

    <!-- DroneManager Connection Panel -->
    <div class="dm-panel">
        <div class="dm-status-dot" id="dm-dot"></div>
        <span class="dm-status-text" id="dm-status-text">DroneManager: unknown</span>

        <label>Host</label>
        <input type="text" id="dm-host" value="127.0.0.1" placeholder="127.0.0.1" />
        <label>Port</label>
        <input type="text" id="dm-port" value="31659" placeholder="31659" class="port-input" />

        <button class="dm-btn" id="dm-check-btn" onclick="checkDmStatus()">Check DM</button>
        <button class="dm-btn" id="dm-auto-btn" onclick="toggleAutoCheck()">Auto: OFF</button>

        <span class="dm-separator"></span>
        <span style="font-size:0.75rem; color:#555;">UDP probe → DM external plugin</span>
    </div>

    <!-- Video Streams -->
    <div class="streams-container">
        <div class="stream-box">
            <h2>Camera 1 (green)</h2>
            <div class="video-container">
                <canvas id="video-canvas1" class="video-canvas"></canvas>
            </div>
            <div class="controls">
                <button onclick="startStream(0)">Start</button>
                <button onclick="stopStream(0)">Stop</button>
            </div>
            <div id="status1" class="status"></div>
        </div>

        <div class="stream-box">
            <h2>Camera 2 (yellow)</h2>
            <div class="video-container">
                <canvas id="video-canvas2" class="video-canvas"></canvas>
            </div>
            <div class="controls">
                <button onclick="startStream(1)">Start</button>
                <button onclick="stopStream(1)">Stop</button>
            </div>
            <div id="status2" class="status"></div>
        </div>

        <div class="stream-box">
            <h2>Camera 3 (blue)</h2>
            <div class="video-container">
                <canvas id="video-canvas3" class="video-canvas"></canvas>
            </div>
            <div class="controls">
                <button onclick="startStream(2)">Start</button>
                <button onclick="stopStream(2)">Stop</button>
            </div>
            <div id="status3" class="status"></div>
        </div>
    </div>

    <script>
        const hostname = window.location.hostname || 'localhost';

        // ── DM Connection ──────────────────────────────────────────────
        let autoCheckInterval = null;

        async function checkDmStatus() {
            const host = document.getElementById('dm-host').value.trim() || '127.0.0.1';
            const port = document.getElementById('dm-port').value.trim() || '31659';
            const dot  = document.getElementById('dm-dot');
            const txt  = document.getElementById('dm-status-text');
            const btn  = document.getElementById('dm-check-btn');

            dot.className = 'dm-status-dot checking';
            txt.textContent = 'DroneManager: checking...';
            btn.disabled = true;

            try {
                const res  = await fetch(`/api/dm-status?host=${encodeURIComponent(host)}&port=${encodeURIComponent(port)}`);
                const data = await res.json();

                if (data.connected) {
                    dot.className = 'dm-status-dot connected';
                    txt.textContent = `DroneManager: connected (${host}:${port})`;
                } else {
                    dot.className = 'dm-status-dot disconnected';
                    const reason = data.error === 'timeout' ? 'no response' : (data.error || 'unreachable');
                    txt.textContent = `DroneManager: offline — ${reason}`;
                }
            } catch (err) {
                dot.className = 'dm-status-dot disconnected';
                txt.textContent = 'DroneManager: check failed';
            }

            btn.disabled = false;
        }

        function toggleAutoCheck() {
            const btn = document.getElementById('dm-auto-btn');
            if (autoCheckInterval) {
                clearInterval(autoCheckInterval);
                autoCheckInterval = null;
                btn.textContent = 'Auto: OFF';
                btn.classList.remove('auto-on');
            } else {
                checkDmStatus();
                autoCheckInterval = setInterval(checkDmStatus, 5000);
                btn.textContent = 'Auto: ON (5s)';
                btn.classList.add('auto-on');
            }
        }

        // ── Video Streams ──────────────────────────────────────────────
        const streamConfigs = [
            { wsPort: 9991, canvasId: 'video-canvas1', statusId: 'status1' },
            { wsPort: 9992, canvasId: 'video-canvas2', statusId: 'status2' },
            { wsPort: 9993, canvasId: 'video-canvas3', statusId: 'status3' },
        ];

        const players = new Array(3).fill(null);

        function startStream(index) {
            if (players[index]) stopStream(index);

            const config    = streamConfigs[index];
            const statusDiv = document.getElementById(config.statusId);
            const canvas    = document.getElementById(config.canvasId);

            statusDiv.textContent = 'Connecting...';
            statusDiv.className   = 'status';

            try {
                players[index] = new JSMpeg.Player(`ws://${hostname}:${config.wsPort}`, {
                    canvas,
                    audio: false,
                    pauseWhenHidden: false,
                    disableWebAssembly: true,
                    videoBufferSize: 1024 * 1024,
                    onSourceEstablished: () => {
                        statusDiv.textContent = 'Connected';
                        statusDiv.className   = 'status connected';
                    },
                    onSourceCompleted: () => {
                        statusDiv.textContent = 'Stream ended';
                        statusDiv.className   = 'status disconnected';
                        setTimeout(() => startStream(index), 5000);
                    },
                    onError: (error) => {
                        statusDiv.textContent = 'Error: ' + error;
                        statusDiv.className   = 'status disconnected';
                        setTimeout(() => startStream(index), 5000);
                    },
                });
            } catch (error) {
                statusDiv.textContent = 'Failed: ' + error.message;
                statusDiv.className   = 'status disconnected';
                setTimeout(() => startStream(index), 5000);
            }
        }

        function stopStream(index) {
            if (players[index]) {
                players[index].destroy();
                players[index] = null;
                const statusDiv = document.getElementById(streamConfigs[index].statusId);
                statusDiv.textContent = 'Stopped';
                statusDiv.className   = 'status disconnected';
            }
        }

        window.addEventListener('load', () => {
            streamConfigs.forEach((_, i) => {
                setTimeout(() => startStream(i), 1000 + i * 1000);
            });
        });
    </script>
</body>
</html>
